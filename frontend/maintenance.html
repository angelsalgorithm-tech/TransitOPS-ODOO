<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Maintenance</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
   <nav class="sidebar">
  <h2>TransitOps</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="vehicles.html">Fleet</a>
  <a href="drivers.html">Drivers</a>
  <a href="compliance.html">Compliance</a>
  <a href="trips.html">Trips</a>
  <a href="maintenance.html">Maintenance</a>
  <a href="reports.html#fuel">Fuel &amp; Expenses</a>
  <a href="reports.html#analytics">Analytics</a>
  <a href="settings.html" style="margin-top:20px;">Settings</a>
  <a href="#" onclick="logout(); return false;" style="color:var(--red);">Log out</a>
</nav>
    <main class="main">
      <div class="topbar">
        <input type="text" class="topbar-search" placeholder="Search..." />
        <div>
          <span class="user-badge" id="userBadge"></span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
      </div>

      <div id="alertBox"></div>

      <h1 style="font-size:20px; margin: 0 0 20px;">Maintenance</h1>

      <div class="split-columns">
        <div class="panel-card">
          <h3>Log Service Record</h3>
          <div id="modalAlert"></div>
          <form id="maintenanceForm">
            <div class="field"><label>Vehicle</label><select id="vehicle_id" required></select></div>
            <div class="field"><label>Service Type</label><input id="issue" placeholder="e.g. Oil Change" required /></div>
            <div class="field"><label>Cost</label><input id="cost" type="number" step="0.01" value="0" /></div>
            <div class="field"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
            <button type="submit" class="btn-primary" style="width:100%;">Save</button>
          </form>

          <div style="margin-top:24px;">
            <div class="arrow-flow"><span class="status-pill status-available">Available</span> → <span class="status-pill status-inshop">In Shop</span></div>
            <div class="arrow-flow"><span class="status-pill status-inshop">In Shop</span> → <span class="status-pill status-available">Available</span></div>
          </div>
          <p style="font-size:12px; color:var(--accent); margin-top:10px;">
            Note: In Shop vehicles are removed from the dispatch pool.
          </p>
        </div>

        <div class="panel-card">
          <h3>Service Log</h3>
          <table>
            <thead>
              <tr><th>Vehicle</th><th>Service</th><th>Cost</th><th>Date</th><th>Status</th><th></th></tr>
            </thead>
            <tbody id="maintenanceTableBody">
              <tr><td colspan="6">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav-access.js"></script>
  <script src="js/maintenance.js"></script>
</body>
</html>
