<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Dashboard</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
  <nav class="sidebar">
  <h2>TransitOps</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="vehicles.html">Fleet</a>
  <a href="drivers.html">Drivers</a>
  <a href="compliance.html">Compliance</a>
  <a href="trips.html">Trips</a>
  <a href="maintenance.html">Maintenance</a>
  <a href="reports.html#fuel">Fuel &amp; Expenses</a>
  <a href="reports.html#analytics">Analytics</a>
  <a href="settings.html" style="margin-top:20px;">Settings</a>
  <a href="#" onclick="logout(); return false;" style="color:var(--red);">Log out</a>
</nav>

    <main class="main">
      <div class="topbar">
        <input type="text" class="topbar-search" placeholder="Search..." />
        <div>
          <span class="user-badge" id="userBadge"></span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
      </div>

      <div id="alertBox"></div>

      <div class="filters-row">
        <select><option>Vehicle Type: All</option></select>
        <select><option>Status: All</option></select>
        <select><option>Region: All</option></select>
      </div>

      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card"><div class="value">—</div><div class="label">Loading...</div></div>
      </div>

      <div class="dashboard-columns">
        <div class="panel-card">
          <h3>Recent Trips</h3>
          <table>
            <thead>
              <tr><th>Trip</th><th>Vehicle</th><th>Driver</th><th>Status</th><th>ETA</th></tr>
            </thead>
            <tbody id="recentTripsBody">
              <tr><td colspan="5">Loading...</td></tr>
            </tbody>
          </table>
        </div>

        <div class="panel-card">
          <h3>Vehicle Status</h3>
          <div id="vehicleStatusBars">Loading...</div>
        </div>
      </div>

      <h2 style="font-size:16px; margin: 28px 0 14px;">Quick actions</h2>
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <a href="vehicles.html" class="btn-secondary">+ Register Vehicle</a>
        <a href="trips.html" class="btn-secondary">+ Create Trip</a>
        <a href="maintenance.html" class="btn-secondary">+ Raise Maintenance</a>
      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav-access.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
