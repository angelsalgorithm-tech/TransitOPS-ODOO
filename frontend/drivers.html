<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Drivers</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
      <h2>TransitOps</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="vehicles.html">Vehicles</a>
      <a href="drivers.html" class="active">Drivers</a>
      <a href="trips.html">Trips</a>
      <a href="maintenance.html">Maintenance</a>
      <a href="reports.html">Reports</a>
      <a href="#" onclick="logout(); return false;" style="margin-top:20px; color:var(--red);">Log out</a>
    </nav>

    <main class="main">
      <div class="topbar">
        <h1>Driver Management</h1>
        <button class="btn-primary" onclick="openModal()">+ Add Driver</button>
      </div>

      <div id="alertBox"></div>

      <table>
        <thead>
          <tr>
            <th>Name</th><th>License No.</th><th>Category</th><th>Expiry</th>
            <th>Safety Score</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="driverTableBody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Add Driver</h3>
      <div id="modalAlert"></div>
      <form id="driverForm">
        <div class="field"><label>Name</label><input id="name" required /></div>
        <div class="field"><label>License Number</label><input id="license_number" required /></div>
        <div class="field"><label>License Category</label>
          <select id="license_category">
            <option>LMV</option><option>HMV</option><option>MC</option>
          </select>
        </div>
        <div class="field"><label>License Expiry</label><input id="license_expiry" type="date" required /></div>
        <div class="field"><label>Contact Number</label><input id="contact_number" required /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Add Driver</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/drivers.js"></script>
</body>
</html>
