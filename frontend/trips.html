<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Trips</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
  <nav class="sidebar">
  <h2>TransitOps</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="vehicles.html">Fleet</a>
  <a href="drivers.html">Drivers</a>
  <a href="trips.html" class="active">Trips</a>
  <a href="maintenance.html">Maintenance</a>
  <a href="reports.html">Fuel &amp; Expenses</a>
  <a href="reports.html">Analytics</a>
  <a href="#" onclick="logout(); return false;" style="margin-top:20px; color:var(--red);">Log out</a>
  <a href="#" style="margin-top:4px;">Settings</a>
</nav>

    <main class="main">
      <div class="topbar">
        <h1>Trip Management</h1>
        <button class="btn-primary" onclick="openModal()">+ Create Trip</button>
      </div>

      <div id="alertBox"></div>

      <table>
        <thead>
          <tr>
            <th>Route</th><th>Vehicle</th><th>Driver</th><th>Cargo (kg)</th>
            <th>Distance (km)</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="tripTableBody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Create Trip</h3>
      <div id="modalAlert"></div>
      <form id="tripForm">
        <div class="field"><label>Source</label><input id="source" required /></div>
        <div class="field"><label>Destination</label><input id="destination" required /></div>
        <div class="field"><label>Vehicle</label><select id="vehicle_id" required></select></div>
        <div class="field"><label>Driver</label><select id="driver_id" required></select></div>
        <div class="field"><label>Cargo Weight (kg)</label><input id="cargo_weight_kg" type="number" step="0.1" required /></div>
        <div class="field"><label>Planned Distance (km)</label><input id="planned_distance_km" type="number" step="0.1" required /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Create Trip</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Complete trip modal -->
  <div class="modal-overlay" id="completeModalOverlay">
    <div class="modal">
      <h3>Complete Trip</h3>
      <div id="completeModalAlert"></div>
      <form id="completeForm">
        <input type="hidden" id="completeTripId" />
        <div class="field"><label>Final Odometer</label><input id="final_odometer" type="number" step="0.1" required /></div>
        <div class="field"><label>Fuel Consumed (liters)</label><input id="fuel_consumed_liters" type="number" step="0.1" required /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeCompleteModal()">Cancel</button>
          <button type="submit" class="btn-primary">Mark Completed</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/trips.js"></script>
</body>
</html>
