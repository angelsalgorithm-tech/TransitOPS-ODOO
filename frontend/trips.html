<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Trip Dispatcher</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
<nav class="sidebar">
  <h2>TransitOps</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="vehicles.html">Fleet</a>
  <a href="drivers.html">Drivers</a>
  <a href="compliance.html">Compliance</a>
  <a href="trips.html" class="active">Trips</a>
  <a href="maintenance.html">Maintenance</a>
  <a href="reports.html#fuel">Fuel &amp; Expenses</a>
  <a href="reports.html#analytics">Analytics</a>
  <a href="settings.html" style="margin-top:20px;">Settings</a>
  <a href="#" onclick="logout(); return false;" style="color:var(--red);">Log out</a>
</nav>

    <main class="main">
      <div class="topbar">
        <input type="text" class="topbar-search" placeholder="Search..." />
        <div>
          <span class="user-badge" id="userBadge"></span>
          <span class="role-badge" id="roleBadge"></span>
        </div>
      </div>

      <div id="alertBox"></div>

      <h1 style="font-size:20px; margin: 0 0 20px;">Trip Dispatcher</h1>

      <div class="lifecycle-stepper">
        <div class="step done"><div class="line"></div><div class="dot"></div><div class="step-label">Draft</div></div>
        <div class="step active"><div class="line"></div><div class="dot"></div><div class="step-label">Dispatched</div></div>
        <div class="step"><div class="line"></div><div class="dot"></div><div class="step-label">Completed</div></div>
        <div class="step"><div class="dot"></div><div class="step-label">Cancelled</div></div>
      </div>

      <div class="split-columns">
        <div class="panel-card">
          <h3>Create Trip</h3>
          <div id="modalAlert"></div>
          <form id="tripForm">
            <div class="field"><label>Source</label><input id="source" required /></div>
            <div class="field"><label>Destination</label><input id="destination" required /></div>
            <div class="field"><label>Vehicle (Available only)</label><select id="vehicle_id" required></select></div>
            <div class="field"><label>Driver (Available only)</label><select id="driver_id" required></select></div>
            <div class="field"><label>Cargo Weight (kg)</label><input id="cargo_weight_kg" type="number" step="0.1" required /></div>
            <div class="field"><label>Planned Distance (km)</label><input id="planned_distance_km" type="number" step="0.1" required /></div>

            <div id="capacityWarning"></div>

            <div class="modal-actions" style="justify-content:flex-start;">
              <button type="submit" class="btn-primary" id="tripSubmitBtn">Create Trip</button>
              <button type="button" class="btn-secondary" onclick="document.getElementById('tripForm').reset(); checkCapacity();">Cancel</button>
            </div>
          </form>
        </div>

        <div class="panel-card">
          <h3>Live Board</h3>
          <div id="liveBoard">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="completeModalOverlay">
    <div class="modal">
      <h3>Complete Trip</h3>
      <div id="completeModalAlert"></div>
      <form id="completeForm">
        <input type="hidden" id="completeTripId" />
        <div class="field"><label>Final Odometer</label><input id="final_odometer" type="number" step="0.1" required /></div>
        <div class="field"><label>Fuel Consumed (Liters)</label><input id="fuel_consumed_liters" type="number" step="0.1" required /></div>
        <div class="field"><label>Revenue Generated</label><input id="revenue_generated" type="number" step="0.01" value="0" /></div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeCompleteModal()">Cancel</button>
          <button type="submit" class="btn-primary">Complete</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav-access.js"></script>
  <script src="js/trips.js"></script>
</body>
</html>
