<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TransitOps — Reports</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <nav class="sidebar">
  <h2>TransitOps</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="vehicles.html">Fleet</a>
  <a href="drivers.html">Drivers</a>
  <a href="trips.html">Trips</a>
  <a href="maintenance.html">Maintenance</a>
  <a href="reports.html" class="active">Fuel &amp; Expenses</a>
  <a href="reports.html">Analytics</a>
  <a href="#" onclick="logout(); return false;" style="margin-top:20px; color:var(--red);">Log out</a>
  <a href="#" style="margin-top:4px;">Settings</a>
</nav>

    <main class="main">
      <div class="topbar">
        <h1>Reports &amp; Analytics</h1>
        <button class="btn-secondary" onclick="exportCsv()">Export CSV</button>
      </div>

      <div id="alertBox"></div>

      <table>
        <thead>
          <tr>
            <th>Vehicle</th><th>Fuel Cost</th><th>Maintenance Cost</th>
            <th>Operational Cost</th><th>Distance (km)</th><th>Fuel Efficiency (km/L)</th><th>ROI</th>
          </tr>
        </thead>
        <tbody id="reportTableBody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>

      <h2 style="font-size:16px; margin: 32px 0 14px;">Licenses expiring within 30 days</h2>
      <table>
        <thead><tr><th>Driver</th><th>License No.</th><th>Expiry</th></tr></thead>
        <tbody id="licenseTableBody">
          <tr><td colspan="3">Loading...</td></tr>
        </tbody>
      </table>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
