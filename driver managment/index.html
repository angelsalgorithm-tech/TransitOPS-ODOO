<!DOCTYPE html>
<html lang="en">
<head>

    <title>Drivers & Safety Profiles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>🚚 TransitOps</h2>

        <ul>
            <li>🏠 Dashboard</li>
            <li>🚛 Fleet</li>

        <div class="header">

<script src="script.js"></script>
